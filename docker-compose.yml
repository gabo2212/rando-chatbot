services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rando-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rando
      POSTGRES_PASSWORD: rando
      POSTGRES_DB: rando
    ports:
      - "5433:5432"
    volumes:
      - rando_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init-vector.sql:/docker-entrypoint-initdb.d/01-vector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rando -d rando"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: rando-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - rando_ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    container_name: rando-ollama-init
    depends_on:
      ollama:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Waiting for Ollama..."
        until ollama list >/dev/null 2>&1; do sleep 2; done
        echo "Pulling nomic-embed-text..."
        ollama pull nomic-embed-text
        echo "Embedding model ready."
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

volumes:
  rando_pg_data:
  rando_ollama_data:
